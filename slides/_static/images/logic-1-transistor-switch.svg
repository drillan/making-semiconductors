<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="780" height="320" fill="#fdf6e3"/>

  <line x1="390" y1="40" x2="390" y2="270" stroke="#93a1a1" stroke-dasharray="5 5"/>

  <!-- ===== ON state ===== -->
  <text x="200" y="46" text-anchor="middle" font-size="17" font-weight="bold" fill="#073642">ゲート入力 = 1（High電圧）</text>
  <text x="200" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#859900">ON（導通）→ 出力 1</text>

  <!-- wires + terminals -->
  <line x1="60" y1="165" x2="120" y2="165" stroke="#073642" stroke-width="3"/>
  <text x="56" y="170" text-anchor="end" font-size="13" fill="#073642">電源</text>
  <line x1="280" y1="165" x2="345" y2="165" stroke="#073642" stroke-width="3"/>
  <text x="352" y="170" font-size="13" fill="#073642">出力</text>
  <circle cx="120" cy="165" r="5" fill="#073642"/>
  <circle cx="280" cy="165" r="5" fill="#073642"/>
  <!-- closed lever (conducting) -->
  <line x1="120" y1="165" x2="280" y2="165" stroke="#859900" stroke-width="5"/>
  <!-- current arrows -->
  <polygon points="205,165 193,159 193,171" fill="#859900"/>
  <!-- gate control -->
  <line x1="200" y1="235" x2="200" y2="180" stroke="#6c71c4" stroke-width="2.5"/>
  <polygon points="200,174 194,186 206,186" fill="#6c71c4"/>
  <text x="200" y="255" text-anchor="middle" font-size="13" fill="#6c71c4">ゲート G = 1</text>

  <!-- ===== OFF state ===== -->
  <text x="585" y="46" text-anchor="middle" font-size="17" font-weight="bold" fill="#073642">ゲート入力 = 0（Low電圧）</text>
  <text x="585" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#cb4b16">OFF（遮断）→ 出力 0</text>

  <line x1="445" y1="165" x2="505" y2="165" stroke="#073642" stroke-width="3"/>
  <text x="441" y="170" text-anchor="end" font-size="13" fill="#073642">電源</text>
  <line x1="665" y1="165" x2="730" y2="165" stroke="#073642" stroke-width="3"/>
  <text x="737" y="170" font-size="13" fill="#073642">出力</text>
  <circle cx="505" cy="165" r="5" fill="#073642"/>
  <circle cx="665" cy="165" r="5" fill="#073642"/>
  <!-- open lever (no conduction) -->
  <line x1="505" y1="165" x2="600" y2="132" stroke="#93a1a1" stroke-width="5"/>
  <text x="600" y="150" font-size="12" fill="#cb4b16">×（切れている）</text>
  <!-- gate control -->
  <line x1="585" y1="235" x2="585" y2="180" stroke="#6c71c4" stroke-width="2.5"/>
  <polygon points="585,174 579,186 591,186" fill="#6c71c4"/>
  <text x="585" y="255" text-anchor="middle" font-size="13" fill="#6c71c4">ゲート G = 0</text>

  <!-- caption -->
  <text x="390" y="295" text-anchor="middle" font-size="14" fill="#586e75">MOSトランジスタ ＝ ゲート電圧で電流を ON/OFF するスイッチ（ON=1 / OFF=0）</text>
</svg>
