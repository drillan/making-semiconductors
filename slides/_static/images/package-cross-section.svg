<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="780" height="360" fill="#fdf6e3"/>

  <!-- panel titles -->
  <text x="195" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#073642">リードフレーム型（従来型）</text>
  <text x="585" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#073642">FC-BGA型（先端型）</text>

  <!-- ===== PANEL 1: leadframe package ===== -->
  <!-- mold resin body -->
  <rect x="80" y="80" width="230" height="120" fill="#c9c2a6" stroke="#8a8468"/>
  <!-- die pad -->
  <rect x="140" y="160" width="110" height="12" fill="#657b83" stroke="#465a61"/>
  <!-- chip on die pad -->
  <rect x="160" y="132" width="70" height="28" fill="#cb4b16" stroke="#8a3110"/>
  <text x="195" y="151" text-anchor="middle" font-size="12" fill="#fdf6e3">チップ</text>
  <!-- inner leads (left & right) -->
  <rect x="80" y="160" width="44" height="12" fill="#657b83" stroke="#465a61"/>
  <rect x="266" y="160" width="44" height="12" fill="#657b83" stroke="#465a61"/>
  <!-- outer leads bending down -->
  <path d="M80,166 h-28 v22 h-14" fill="none" stroke="#465a61" stroke-width="7"/>
  <path d="M310,166 h28 v22 h14" fill="none" stroke="#465a61" stroke-width="7"/>
  <!-- bond wires -->
  <path d="M166,132 Q140,104 100,158" fill="none" stroke="#b58900" stroke-width="2.4"/>
  <path d="M224,132 Q250,104 290,158" fill="none" stroke="#b58900" stroke-width="2.4"/>

  <!-- labels panel 1 -->
  <text x="195" y="70" text-anchor="middle" font-size="12" fill="#586e75">モールド樹脂（封止）</text>
  <line x1="195" y1="75" x2="195" y2="88" stroke="#586e75" stroke-width="1"/>
  <text x="118" y="98" text-anchor="end" font-size="12" fill="#8a6d00">ワイヤ</text>
  <line x1="122" y1="102" x2="136" y2="116" stroke="#8a6d00" stroke-width="1"/>
  <text x="60" y="230" text-anchor="start" font-size="12" fill="#586e75">リードフレーム（金属の枠・外部端子）</text>
  <line x1="70" y1="218" x2="45" y2="192" stroke="#586e75" stroke-width="1"/>
  <text x="195" y="266" text-anchor="middle" font-size="13" fill="#586e75">ワイヤボンディングで接続し</text>
  <text x="195" y="284" text-anchor="middle" font-size="13" fill="#586e75">樹脂で封止する</text>

  <!-- divider -->
  <line x1="392" y1="52" x2="392" y2="308" stroke="#93a1a1" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== PANEL 2: FC-BGA package ===== -->
  <!-- motherboard -->
  <rect x="450" y="252" width="270" height="16" fill="#859900" stroke="#5c6b00"/>
  <text x="585" y="288" text-anchor="middle" font-size="12" fill="#586e75">マザーボード</text>
  <!-- solder balls -->
  <g fill="#93a1a1" stroke="#586e75">
    <circle cx="482" cy="244" r="8"/>
    <circle cx="516" cy="244" r="8"/>
    <circle cx="550" cy="244" r="8"/>
    <circle cx="584" cy="244" r="8"/>
    <circle cx="618" cy="244" r="8"/>
    <circle cx="652" cy="244" r="8"/>
    <circle cx="686" cy="244" r="8"/>
  </g>
  <!-- package substrate -->
  <rect x="462" y="208" width="246" height="28" fill="#6c71c4" stroke="#454a91"/>
  <text x="585" y="227" text-anchor="middle" font-size="12" fill="#fdf6e3">パッケージ基板（ABF絶縁層）</text>
  <!-- bumps -->
  <g fill="#b58900" stroke="#8a6d00">
    <circle cx="540" cy="202" r="5"/>
    <circle cx="562" cy="202" r="5"/>
    <circle cx="584" cy="202" r="5"/>
    <circle cx="606" cy="202" r="5"/>
    <circle cx="628" cy="202" r="5"/>
  </g>
  <!-- chip (flip-chip) -->
  <rect x="528" y="168" width="114" height="28" fill="#cb4b16" stroke="#8a3110"/>
  <text x="585" y="187" text-anchor="middle" font-size="12" fill="#fdf6e3">チップ（ダイ）</text>
  <!-- lid / encapsulation -->
  <path d="M478,208 v-78 h214 v78 h-16 v-62 h-182 v62 z" fill="#c9c2a6" stroke="#8a8468"/>
  <text x="585" y="118" text-anchor="middle" font-size="12" fill="#586e75">封止・放熱リッド</text>
  <line x1="585" y1="123" x2="585" y2="134" stroke="#586e75" stroke-width="1"/>

  <!-- labels panel 2 -->
  <text x="518" y="160" text-anchor="end" font-size="12" fill="#8a3110">ウェハーから切り出したダイ</text>
  <line x1="521" y1="164" x2="534" y2="176" stroke="#8a3110" stroke-width="1"/>
  <text x="672" y="200" text-anchor="start" font-size="12" fill="#8a6d00">バンプ</text>
  <line x1="670" y1="204" x2="636" y2="203" stroke="#8a6d00" stroke-width="1"/>
  <text x="452" y="247" text-anchor="end" font-size="12" fill="#586e75">はんだボール</text>
  <!-- caption panel 2 -->
  <text x="585" y="316" text-anchor="middle" font-size="13" fill="#586e75">チップを裏返しバンプで基板に直接接続（フリップチップ）</text>
  <text x="585" y="334" text-anchor="middle" font-size="13" fill="#586e75">基板がリードフレームに代わる土台になる</text>

  <!-- caption panel 1 (baseline align) -->
  <text x="195" y="316" text-anchor="middle" font-size="13" fill="#586e75">車載・電源用など今も広く使われる</text>
</svg>
