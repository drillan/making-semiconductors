<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="780" height="340" fill="#fdf6e3"/>

  <text x="390" y="32" text-anchor="middle" font-size="15" fill="#586e75">論理ゲートを組み合わせると2進数の計算ができる（例：半加算器 A＋B）</text>

  <!-- input block -->
  <rect x="34" y="96" width="96" height="128" rx="8" fill="#eee8d5" stroke="#586e75"/>
  <text x="82" y="122" text-anchor="middle" font-size="14" fill="#073642">入力</text>
  <text x="82" y="156" text-anchor="middle" font-size="18" font-weight="bold" fill="#859900">A = 1</text>
  <text x="82" y="190" text-anchor="middle" font-size="18" font-weight="bold" fill="#859900">B = 1</text>
  <text x="82" y="214" text-anchor="middle" font-size="10" fill="#586e75">同じA・Bを両方へ</text>

  <!-- arrows to gates -->
  <line x1="130" y1="140" x2="196" y2="112" stroke="#586e75" stroke-width="2"/>
  <polygon points="196,112 184,110 189,121" fill="#586e75"/>
  <line x1="130" y1="184" x2="196" y2="205" stroke="#586e75" stroke-width="2"/>
  <polygon points="196,205 184,199 185,210" fill="#586e75"/>

  <!-- XOR gate (Sum) -->
  <line x1="206" y1="100" x2="224" y2="100" stroke="#073642" stroke-width="2"/>
  <line x1="206" y1="124" x2="224" y2="124" stroke="#073642" stroke-width="2"/>
  <text x="214" y="94" text-anchor="middle" font-size="11" fill="#859900">1</text>
  <text x="214" y="140" text-anchor="middle" font-size="11" fill="#859900">1</text>
  <path d="M218,88 Q236,112 218,136" fill="none" stroke="#073642" stroke-width="2"/>
  <path d="M226,88 Q244,112 226,136 Q262,136 286,112 Q262,88 226,88 Z" fill="#eee8d5" stroke="#073642" stroke-width="2"/>
  <text x="252" y="116" text-anchor="middle" font-size="11" fill="#073642">XOR</text>
  <line x1="286" y1="112" x2="330" y2="112" stroke="#073642" stroke-width="2"/>
  <text x="392" y="116" text-anchor="middle" font-size="16" font-weight="bold" fill="#268bd2">和 S = 0</text>
  <text x="300" y="150" text-anchor="middle" font-size="10" fill="#586e75">XOR＝入力が異なれば1（1と1→0）</text>

  <!-- AND gate (Carry) -->
  <line x1="206" y1="196" x2="226" y2="196" stroke="#073642" stroke-width="2"/>
  <line x1="206" y1="220" x2="226" y2="220" stroke="#073642" stroke-width="2"/>
  <text x="214" y="192" text-anchor="middle" font-size="11" fill="#859900">1</text>
  <text x="214" y="236" text-anchor="middle" font-size="11" fill="#859900">1</text>
  <path d="M226,186 H250 A22 22 0 0 1 250,230 H226 Z" fill="#eee8d5" stroke="#073642" stroke-width="2"/>
  <text x="242" y="212" text-anchor="middle" font-size="11" fill="#073642">AND</text>
  <line x1="272" y1="208" x2="330" y2="208" stroke="#073642" stroke-width="2"/>
  <text x="402" y="212" text-anchor="middle" font-size="16" font-weight="bold" fill="#cb4b16">桁上げ C = 1</text>
  <text x="300" y="246" text-anchor="middle" font-size="10" fill="#586e75">AND＝両方1のとき1（1と1→1）</text>

  <!-- result panel -->
  <rect x="500" y="86" width="250" height="150" rx="10" fill="#eee8d5" stroke="#073642"/>
  <text x="625" y="116" text-anchor="middle" font-size="14" fill="#073642">桁上げ C ｜ 和 S</text>
  <text x="625" y="158" text-anchor="middle" font-size="40" font-weight="bold"><tspan fill="#cb4b16">1</tspan><tspan fill="#073642"> </tspan><tspan fill="#268bd2">0</tspan></text>
  <text x="625" y="192" text-anchor="middle" font-size="20" font-weight="bold" fill="#073642">1 ＋ 1 ＝ 10（2進）</text>
  <text x="625" y="216" text-anchor="middle" font-size="13" fill="#586e75">2進数の 10 ＝ 10進数の 2</text>

  <text x="390" y="312" text-anchor="middle" font-size="14" fill="#586e75">スイッチ → 1/0 → 論理ゲート → 2進数演算　これを数十億個ぶん高速に繰り返すのがチップ</text>
</svg>
