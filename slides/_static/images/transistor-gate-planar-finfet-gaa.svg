<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect x="0" y="0" width="720" height="320" fill="#fdf6e3"/>

  <!-- ===== Panel A: 平面（プレーナ） ===== -->
  <text x="140" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#073642">平面（プレーナ）</text>
  <!-- substrate -->
  <rect x="60" y="180" width="160" height="20" fill="#eee8d5" stroke="#93a1a1"/>
  <!-- source / drain -->
  <rect x="60" y="150" width="34" height="30" fill="#93a1a1"/>
  <rect x="186" y="150" width="34" height="30" fill="#93a1a1"/>
  <text x="77" y="170" text-anchor="middle" font-size="13" fill="#fdf6e3">S</text>
  <text x="203" y="170" text-anchor="middle" font-size="13" fill="#fdf6e3">D</text>
  <!-- channel -->
  <rect x="94" y="162" width="92" height="18" fill="#cb4b16"/>
  <!-- gate oxide -->
  <rect x="94" y="156" width="92" height="6" fill="#b58900"/>
  <!-- gate (top only) -->
  <rect x="94" y="130" width="92" height="26" fill="#268bd2"/>
  <text x="140" y="147" text-anchor="middle" font-size="13" fill="#fdf6e3">ゲート</text>
  <text x="140" y="230" text-anchor="middle" font-size="15" fill="#073642">ゲート接触：<tspan font-weight="bold">上の1面</tspan></text>

  <!-- ===== Panel B: FinFET ===== -->
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#073642">FinFET</text>
  <rect x="300" y="180" width="120" height="20" fill="#eee8d5" stroke="#93a1a1"/>
  <!-- fin (channel, standing) -->
  <rect x="344" y="120" width="32" height="60" fill="#cb4b16"/>
  <!-- gate wraps 3 sides -->
  <rect x="326" y="108" width="18" height="72" fill="#268bd2"/>
  <rect x="376" y="108" width="18" height="72" fill="#268bd2"/>
  <rect x="326" y="108" width="68" height="18" fill="#268bd2"/>
  <text x="360" y="122" text-anchor="middle" font-size="12" fill="#fdf6e3">ゲート</text>
  <text x="360" y="230" text-anchor="middle" font-size="15" fill="#073642">ゲート接触：<tspan font-weight="bold">3面</tspan></text>

  <!-- ===== Panel C: GAA（ナノシート） ===== -->
  <text x="580" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#073642">GAA（ナノシート）</text>
  <rect x="520" y="180" width="120" height="20" fill="#eee8d5" stroke="#93a1a1"/>
  <!-- side connectors (one continuous gate) -->
  <rect x="540" y="118" width="12" height="60" fill="#268bd2"/>
  <rect x="608" y="118" width="12" height="60" fill="#268bd2"/>
  <!-- sheet 1: gate all around -->
  <rect x="540" y="118" width="80" height="26" rx="4" fill="#268bd2"/>
  <rect x="550" y="124" width="60" height="14" fill="#cb4b16"/>
  <!-- sheet 2: gate all around -->
  <rect x="540" y="152" width="80" height="26" rx="4" fill="#268bd2"/>
  <rect x="550" y="158" width="60" height="14" fill="#cb4b16"/>
  <text x="580" y="230" text-anchor="middle" font-size="15" fill="#073642">ゲート接触：<tspan font-weight="bold">全周</tspan></text>

  <!-- ===== control-strength arrow ===== -->
  <line x1="120" y1="256" x2="590" y2="256" stroke="#586e75" stroke-width="2"/>
  <polygon points="590,256 578,250 578,262" fill="#586e75"/>
  <text x="355" y="250" text-anchor="middle" font-size="13" fill="#586e75">ゲートの制御力（オフでしっかり止める力）が増す</text>

  <!-- ===== legend ===== -->
  <rect x="215" y="286" width="18" height="14" fill="#268bd2"/>
  <text x="238" y="298" font-size="13" fill="#073642">ゲート</text>
  <rect x="300" y="286" width="18" height="14" fill="#cb4b16"/>
  <text x="323" y="298" font-size="13" fill="#073642">チャネル（電流の通り道）</text>
</svg>
