name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build reveal.js slides
        run: uv run sphinx-build -b revealjs slides slides/_build/revealjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides/_build/revealjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
